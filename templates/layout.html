<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {% if title %}
      <title>{{ title }}</title>
    {% else %}
      <title> Default To Do List</title>
    {% endif %}

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', path='css/main.css') }}"
    />
  </head>




  <body>

    <!-- Button Add Todo Modal trigger in header -->
    <header class="container py-3 d-flex justify-content-end">
      <button
        type="button"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#addTodoModal"
      >
        Add
      </button>
    </header>


    <main class="page-wrap">
      {% block content %}
      {% endblock content %}
    </main>



    <!-- Add Todo Form Modal -->
    <div
      class="modal fade"
      id="addTodoModal"
      tabindex="-1"
      aria-labelledby="addTodoModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addTodoModalLabel">Add Todo</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addTodoForm">
              <div class="mb-3">
                <label for="todoTitle" class="form-label">Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="todoTitle"
                  name="title"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="todoDetails" class="form-label">Details</label>
                <textarea
                  class="form-control"
                  id="todoDetails"
                  name="description"
                  rows="3"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="todoUrgencyLevel" class="form-label">Urgency level</label>
                <select
                  class="form-select"
                  id="todoUrgencyLevel"
                  name="urgency_level"
                  required
                >
                  <option value="" selected disabled>Select urgency</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="submit" form="addTodoForm" class="btn btn-primary">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>


    <!-- Success Modal -->
    <div
      class="modal fade"
      id="successModal"
      tabindex="-1"
      aria-labelledby="successModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="successModalLabel">Success</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p id="successMessage" class="mb-0">Operation completed successfully.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-success" data-bs-dismiss="modal">
              OK
            </button>
          </div>
        </div>
      </div>
    </div>



    <!-- Error Modal -->
    <div
      class="modal fade"
      id="errorModal"
      tabindex="-1"
      aria-labelledby="errorModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="errorModalLabel">Error</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p id="errorMessage" class="mb-0">Something went wrong. Please try again.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>



    <!-- Boostrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>





    <!-- Add Todo Form Handler -->
    <script type = "module">
      import { getErrorMessage, hideModal, showModal } from "/static/js/utils.js";

      // Get form element of the add todo modal and listen for submit event
      const addTodoForm = document.getElementById("addTodoForm");

      addTodoForm.addEventListener("submit", async (event) => {
        event.preventDefault();


        // Collect form values into an object {title: "Example", description: "Details", urgency_level: "high"}
        const formData = new FormData(addTodoForm);
        const todoData = Object.fromEntries(formData.entries());

        try {
          const response = await fetch("/api/todo", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",

            },
            body: JSON.stringify(todoData),
          });

          if (response.ok) {
            const result = await response.json();
            document.getElementById("successMessage").textContent = `Todo "${todoData.title}" added successfully.`;

            hideModal("addTodoModal");
            showModal("successModal");

            addTodoForm.reset();

            //Reload Page after modal is closed to show new todo in list
            document.getElementById("successModal").addEventListener("hidden.bs.modal", () => {
              window.location.reload();
            },
            { once: true }
            );

          } else {
            const error = await response.json();
            document.getElementById("errorMessage").textContent = getErrorMessage(error);

            hideModal("addTodoModal");
            showModal("errorModal");
          }

        } catch (error) {
          document.getElementById("errorMessage").textContent = "Network error. Please try again.";
          
          showModal("errorModal");
        }

      });

    </script>


    <!-- Letting child templates add their own scripts if needed i.e. the post page -->
      {% block scripts %}
      {% endblock scripts %}

      

  </body>

  
</html>
